version: "3.9"

services:
  lieferspatz:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env.example
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: lieferspatz
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: lieferspatz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
